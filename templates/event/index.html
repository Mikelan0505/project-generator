<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{PROJECT}}｜イベント</title>
    <link rel="stylesheet" href="./dist/css/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="l-container">
        <div class="l-inner">
          <h1 class="site-title">
            <a href="index.html">{{PROJECT}}</a>
          </h1>
          <p class="site-tel">お問い合わせ：<a href="tel:{{TEL}}">{{TEL_DISPLAY}}</a></p>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="hero l-section" id="hero">
        <div class="l-container">
          <div class="l-inner">
            <h2>イベントのご案内</h2>
            <p>参加をご希望の方は、下記をご確認のうえお申し込みください。</p>
            <p><a class="c-button" href="tel:{{TEL}}">電話で申し込む</a></p>
          </div>
        </div>
      </section>

      <section class="l-section" id="summary">
        <div class="l-container">
          <div class="l-inner">
            <h2>概要</h2>
            <dl class="kv">
              <dt>開催日</dt>
              <dd>{{DATE}}</dd>
              <dt>時間</dt>
              <dd>00:00〜00:00</dd>
              <dt>会場</dt>
              <dd>〇〇（オンライン可）</dd>
              <dt>参加費</dt>
              <dd>〇〇円</dd>
            </dl>
          </div>
        </div>
      </section>

      <section class="l-section" id="program">
        <div class="l-container">
          <div class="l-inner">
            <h2>内容</h2>
            <ol>
              <li>オープニング</li>
              <li>メインセッション</li>
              <li>質疑応答</li>
            </ol>
          </div>
        </div>
      </section>

      <section class="cta l-section" id="apply">
        <div class="l-container">
          <div class="l-inner">
            <h2>お申し込み</h2>
            <p>お電話で受け付けています。</p>
            <p>
              <a class="c-button" href="tel:{{TEL}}">{{TEL_DISPLAY}} に電話する</a>
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="l-container">
        <div class="l-inner">
          <small>© {{PROJECT}}</small>
        </div>
      </div>
    </footer>
  </body>
</html>
