<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Corporate Modern | About</title>

    <!-- base framework -->
    <link rel="stylesheet" href="./dist/css/main.css" />

    <!-- theme -->
    <link rel="stylesheet" href="./theme-corporate-modern.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="l-container site-header__inner">
        <a href="./index.html" class="site-header__logo"> Corporate Modern </a>

        <nav class="site-header__nav" aria-label="グローバルナビ">
          <ul class="site-header__list">
            <li><a href="./about.html">About</a></li>
            <li><a href="./service.html">Service</a></li>
            <li><a href="./contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="l-section">
        <div class="l-container">
          <div class="c-heading">
            <p class="c-heading__eyebrow">ABOUT</p>
            <h1 class="c-heading__title">会社概要</h1>
            <p class="c-heading__lead">このページは後で埋める（基準崩れ確認用）。</p>
          </div>

          <div class="company">
            <div class="company__inner">
              <figure class="company__media">
                <img src="./assets/img/company.jpg" alt="会社外観" />
              </figure>
              <dl class="c-table">
                <div class="c-table__row">
                  <dt class="c-table__head">会社名</dt>
                  <dd class="c-table__data">株式会社〇〇〇〇</dd>
                </div>
                <div class="c-table__row">
                  <dt class="c-table__head">代表者</dt>
                  <dd class="c-table__data">山田 太郎</dd>
                </div>
                <div class="c-table__row">
                  <dt class="c-table__head">所在地</dt>
                  <dd class="c-table__data">東京都〇〇区〇〇 1-2-3</dd>
                </div>
                <div class="c-table__row">
                  <dt class="c-table__head">設立</dt>
                  <dd class="c-table__data">2018年4月</dd>
                </div>
                <div class="c-table__row">
                  <dt class="c-table__head">事業内容</dt>
                  <dd class="c-table__data">Webサイト制作 / UI設計 / 運用改善</dd>
                </div>
                <div class="c-table__row">
                  <dt class="c-table__head">連絡先</dt>
                  <dd class="c-table__data">
                    <a href="mailto:info@example.com">info@example.com</a>
                  </dd>
                </div>
              </dl>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="l-container site-footer__inner">
        <div class="site-footer__brand">
          <p class="site-footer__name">Corporate Modern</p>
          <p class="site-footer__sub text-sub">整った情報感 × 写真主役。</p>
        </div>

        <nav class="site-footer__nav" aria-label="フッターナビ">
          <ul class="site-footer__list">
            <li><a href="./about.html">About</a></li>
            <li><a href="./service.html">Service</a></li>
            <li><a href="./contact.html">Contact</a></li>
          </ul>
        </nav>

        <small class="site-footer__copy">© 2026 Corporate Modern</small>
      </div>
    </footer>
    <script type="module" src="./dist/js/core/app.js"></script>
</body>
</html>
